name: Weekly IP Range Update

on:
  schedule:
    - cron: '0 12 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cn:
    runs-on: ubuntu-latest
    concurrency:
      group: update-cn
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Backup original file
        run: |
          if [ -f range-cn.txt ]; then
            cp range-cn.txt range-cn-backup.txt
            echo "Original file backed up"
          else
            echo "Original file does not exist, first run"
          fi

      - name: Download new IP ranges with retry
        run: |
          echo "Trying wget..."
          if wget -q -O range-cn-temp.txt "https://api.edgeone.ai/ips?version=v4&area=mainland-china"; then
            echo "Download successful using wget"; exit 0
          fi

          echo "wget failed, trying curl without HTTP/2..."
          if curl -s --http1.1 "https://api.edgeone.ai/ips?version=v4&area=mainland-china" -o range-cn-temp.txt; then
            echo "Download successful using curl --http1.1"; exit 0
          fi

          echo "curl --http1.1 failed, trying curl with insecure flag..."
          if curl -s -k --http1.1 "https://api.edgeone.ai/ips?version=v4&area=mainland-china" -o range-cn-temp.txt; then
            echo "Download successful using curl -k"; exit 0
          fi

          echo "Error: All download methods failed"; exit 1

      - name: Validate downloaded content
        run: |
          if [ ! -f range-cn-temp.txt ]; then
            echo "Error: Downloaded file does not exist"; exit 1
          fi

          file_size=$(stat -c%s range-cn-temp.txt 2>/dev/null || stat -f%z range-cn-temp.txt 2>/dev/null || echo "0")
          if [ "$file_size" -eq 0 ]; then
            echo "Error: Downloaded file is empty"; exit 1
          fi

          valid_lines=$(grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+(/[0-9]+)?$' range-cn-temp.txt | wc -l)
          total_lines=$(wc -l < range-cn-temp.txt)

          if [ "$valid_lines" -eq 0 ]; then
            echo "Error: No valid IP addresses found in the file"
            echo "File content (first 10 lines):"; head -10 range-cn-temp.txt
            exit 1
          fi

          [ "$valid_lines" -lt 10 ] && echo "Warning: Only $valid_lines valid IP ranges found (minimum expected: 10)"
          echo "Validation passed: $valid_lines valid IP ranges out of $total_lines total lines"

      - name: Compare with original
        id: compare
        run: |
          if [ -f range-cn-backup.txt ]; then
            grep -v '^$' range-cn-temp.txt   | sort > range-cn-temp-sorted.txt
            grep -v '^$' range-cn-backup.txt | sort > range-cn-backup-sorted.txt

            if cmp -s range-cn-temp-sorted.txt range-cn-backup-sorted.txt; then
              echo "No changes detected"
              echo "has_changes=false" >> $GITHUB_OUTPUT
            else
              added_count=$(comm -13 range-cn-backup-sorted.txt range-cn-temp-sorted.txt | wc -l)
              removed_count=$(comm -23 range-cn-backup-sorted.txt range-cn-temp-sorted.txt | wc -l)
              echo "Changes detected: +$added_count / -$removed_count"
              echo "has_changes=true"      >> $GITHUB_OUTPUT
              echo "added_count=$added_count"   >> $GITHUB_OUTPUT
              echo "removed_count=$removed_count" >> $GITHUB_OUTPUT

              [ "$added_count"   -gt 0 ] && echo "=== Added (first 5) ===" && comm -13 range-cn-backup-sorted.txt range-cn-temp-sorted.txt | head -5
              [ "$removed_count" -gt 0 ] && echo "=== Removed (first 5) ===" && comm -23 range-cn-backup-sorted.txt range-cn-temp-sorted.txt | head -5
            fi
            rm -f range-cn-temp-sorted.txt range-cn-backup-sorted.txt
          else
            echo "No original file found, treating as first run"
            echo "has_changes=true"         >> $GITHUB_OUTPUT
            echo "added_count=first_run"    >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.compare.outputs.has_changes == 'true'
        run: |
          mv range-cn-temp.txt range-cn.txt

          if [ "${{ steps.compare.outputs.added_count }}" = "first_run" ]; then
            commit_msg="Initial China IP ranges - $(date +'%Y-%m-%d %H:%M:%S UTC')"
          else
            commit_msg="Update China IP ranges (+${{ steps.compare.outputs.added_count }}/-${{ steps.compare.outputs.removed_count }}) - $(date +'%Y-%m-%d %H:%M:%S UTC')"
          fi

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git pull origin ${{ github.ref_name }} --rebase
          git add range-cn.txt
          git commit -m "$commit_msg"
          git push origin HEAD:${{ github.ref_name }}
          echo "✅ range-cn.txt updated successfully"

      - name: Cleanup
        if: always()
        run: rm -f range-cn-temp.txt range-cn-backup.txt range-cn-temp-sorted.txt range-cn-backup-sorted.txt || true


  update-overseas:
    runs-on: ubuntu-latest
    needs: update-cn          # 顺序执行，避免同时 push 产生冲突
    concurrency:
      group: update-overseas
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Backup original file
        run: |
          if [ -f range.txt ]; then
            cp range.txt range-backup.txt
            echo "Original file backed up"
          else
            echo "Original file does not exist, first run"
          fi

      - name: Download new IP ranges with retry
        run: |
          echo "Trying wget..."
          if wget -q -O range-temp.txt "https://api.edgeone.ai/ips?version=v4&area=overseas"; then
            echo "Download successful using wget"; exit 0
          fi

          echo "wget failed, trying curl without HTTP/2..."
          if curl -s --http1.1 "https://api.edgeone.ai/ips?version=v4&area=overseas" -o range-temp.txt; then
            echo "Download successful using curl --http1.1"; exit 0
          fi

          echo "curl --http1.1 failed, trying curl with insecure flag..."
          if curl -s -k --http1.1 "https://api.edgeone.ai/ips?version=v4&area=overseas" -o range-temp.txt; then
            echo "Download successful using curl -k"; exit 0
          fi

          echo "Error: All download methods failed"; exit 1

      - name: Validate downloaded content
        run: |
          if [ ! -f range-temp.txt ]; then
            echo "Error: Downloaded file does not exist"; exit 1
          fi

          file_size=$(stat -c%s range-temp.txt 2>/dev/null || stat -f%z range-temp.txt 2>/dev/null || echo "0")
          if [ "$file_size" -eq 0 ]; then
            echo "Error: Downloaded file is empty"; exit 1
          fi

          valid_lines=$(grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+(/[0-9]+)?$' range-temp.txt | wc -l)
          total_lines=$(wc -l < range-temp.txt)

          if [ "$valid_lines" -eq 0 ]; then
            echo "Error: No valid IP addresses found in the file"
            echo "File content (first 10 lines):"; head -10 range-temp.txt
            exit 1
          fi

          [ "$valid_lines" -lt 10 ] && echo "Warning: Only $valid_lines valid IP ranges found (minimum expected: 10)"
          echo "Validation passed: $valid_lines valid IP ranges out of $total_lines total lines"

      - name: Compare with original
        id: compare
        run: |
          if [ -f range-backup.txt ]; then
            grep -v '^$' range-temp.txt   | sort > range-temp-sorted.txt
            grep -v '^$' range-backup.txt | sort > range-backup-sorted.txt

            if cmp -s range-temp-sorted.txt range-backup-sorted.txt; then
              echo "No changes detected"
              echo "has_changes=false" >> $GITHUB_OUTPUT
            else
              added_count=$(comm -13 range-backup-sorted.txt range-temp-sorted.txt | wc -l)
              removed_count=$(comm -23 range-backup-sorted.txt range-temp-sorted.txt | wc -l)
              echo "Changes detected: +$added_count / -$removed_count"
              echo "has_changes=true"         >> $GITHUB_OUTPUT
              echo "added_count=$added_count"       >> $GITHUB_OUTPUT
              echo "removed_count=$removed_count"   >> $GITHUB_OUTPUT

              [ "$added_count"   -gt 0 ] && echo "=== Added (first 5) ===" && comm -13 range-backup-sorted.txt range-temp-sorted.txt | head -5
              [ "$removed_count" -gt 0 ] && echo "=== Removed (first 5) ===" && comm -23 range-backup-sorted.txt range-temp-sorted.txt | head -5
            fi
            rm -f range-temp-sorted.txt range-backup-sorted.txt
          else
            echo "No original file found, treating as first run"
            echo "has_changes=true"         >> $GITHUB_OUTPUT
            echo "added_count=first_run"    >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.compare.outputs.has_changes == 'true'
        run: |
          mv range-temp.txt range.txt

          if [ "${{ steps.compare.outputs.added_count }}" = "first_run" ]; then
            commit_msg="Initial Overseas IP ranges - $(date +'%Y-%m-%d %H:%M:%S UTC')"
          else
            commit_msg="Update Overseas IP ranges (+${{ steps.compare.outputs.added_count }}/-${{ steps.compare.outputs.removed_count }}) - $(date +'%Y-%m-%d %H:%M:%S UTC')"
          fi

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git pull origin ${{ github.ref_name }} --rebase
          git add range.txt
          git commit -m "$commit_msg"
          git push origin HEAD:${{ github.ref_name }}
          echo "✅ range.txt updated successfully"

      - name: Cleanup
        if: always()
        run: rm -f range-temp.txt range-backup.txt range-temp-sorted.txt range-backup-sorted.txt || true
